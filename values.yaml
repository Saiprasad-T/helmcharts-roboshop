cart:
  deployment:
  replicas: 1
  repository: "saithota9/cart"
  tag: "1.0.0"
  configmap:
    REDIS_HOST: redis
    CATALOGUE_HOST: catalogue
    CATALOGUE_PORT: 8080
  service:
    type: ClusterIP

catalogue:
  deployment:
  replicas: 1
  configmap:
    MONGO_URL: "mongodb://mongodb:27017/catalogue"
  image:
    repository: "saithota9/catalogue"
    tag: "1.0.0"

frontend:
  deployment:
    replicas: 1
    repository: "saithota9/frontend"
    tag: "1.0.0"
  service:
    type: LoadBalancer

mongodb:
  statefulset:
  replicas: 1
  image:
    repository: "saithota9/mongodb"
    tag: "1.0.0"
  headless-service:
    clusterip: None
  service:
    type: ClusterIP
  
mysql:
  statefulset:
  replicas: 1
  repository: "saithota9/mysql"
  tag: "1.0.0"
  headless:
    clusterip: None
  service:
    type: ClusterIP
  configmap:
    MYSQL_ROOT_PASSWORD: "RoboShop@1"

payment:
  deployment:
    replicas: 1
    repository: "saithota9/payment"
    tag: "1.0.0"
  configmap:
    CART_HOST: "cart"
    CART_PORT: "8080"
    USER_HOST: "user"
    USER_PORT: "8080"
    AMQP_HOST: "rabbitmq"
    AMQP_USER: "roboshop"
    AMQP_PASS: "roboshop123"
  service:
    type: ClusterIP
  
rabbitmq:
  statefulset:
    replicas: 1
    repository: "saithota9/rabbitmq"
    tag: "1.0.0"
  headlessservice:
    clusterip: None
    service:
    type: ClusterIP
  configmap:
    RABBITMQ_DEFAULT_USER: "roboshop"
    RABBITMQ_DEFAULT_PASS: "roboshop123"

redis:
  statefulset:
  replicas: 1
  repository: "saithota9/redis"
  tag: "1.0.0"
  headless:
    clusterip: None
  service:
    type: ClusterIP

shipping:
  deployment:
  replicas: 1
  repository: "saithota9/shipping"
  tag: "1.0.0"
  configmap:
    CART_ENDPOINT: "cart:8080"
    DB_HOST: mysql
  service:
    type: ClusterIP
  
user:
  deployment:
  replicas: 1
  repository: "saithota9/user"
  tag: "1.0.0"
  service:
    type: ClusterIP
  configmap:
    REDIS_URL: redis://redis:6379
    MONGO_URL: mongodb://mongodb:27017/users


  